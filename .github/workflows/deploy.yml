name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[채용 리포트] 새 페이지가 배포되었습니다"
          to: 201302386@hufs.ac.kr
          from: "채용 리포트 봇 <${{ secrets.MAIL_USERNAME }}>"
          body: |
            안녕하세요!

            새 채용공고 일일 리포트 페이지가 GitHub Pages에 배포되었습니다.

            ▶ 확인하기: https://lee-sj.github.io/daily-report/

            커밋 메시지: ${{ github.event.head_commit.message }}
            배포 시각: ${{ github.event.head_commit.timestamp }}
